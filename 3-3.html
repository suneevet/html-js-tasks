<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3.3</title>
</head>
<body>
<script>
  function askQuestion(question, correctAnswer) {
    let userAnswer = prompt(question);
    if (userAnswer === null) return false;
    return userAnswer.trim().toLowerCase() === correctAnswer.trim().toLowerCase();
  }

  let questions = [
    "Сколько будет 7 × 8?",
    "Столица Франции?",
    "Сколько планет в Солнечной системе?",
    "Какой язык программирования мы изучаем?",
    "Сколько цветов в радуге?"
  ];

  let answers = [
    "56",
    "Париж",
    "8",
    "JavaScript",
    "7"
  ];

  let correct = 0;

  for (let i = 0; i < questions.length; i++) {
    if (askQuestion(questions[i], answers[i])) {
      correct++;
    }
  }

  alert(`Ты ответил правильно на ${correct} из ${questions.length} вопросов`);
</script>
</body>
</html>
